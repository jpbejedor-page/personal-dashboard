<!DOCTYPE html>
<html>
<head>
    <title>Documents Module Diagnostic</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .test-section { border: 1px solid #ccc; padding: 20px; margin: 20px 0; background: #f9f9f9; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; margin: 5px; background: #4f46e5; color: white; border: none; cursor: pointer; }
        button:hover { background: #4338ca; }
        #output { border: 1px solid #ddd; padding: 15px; margin-top: 10px; background: white; min-height: 200px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Documents Module Diagnostic Tool</h1>
    
    <div class="test-section">
        <h2>Test 1: Fetch TERMS.md</h2>
        <button onclick="testFetchTerms()">Run Test</button>
        <div id="test1-output"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Fetch NOTES.md</h2>
        <button onclick="testFetchNotes()">Run Test</button>
        <div id="test2-output"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Parse Markdown</h2>
        <button onclick="testMarkdownParser()">Run Test</button>
        <div id="test3-output"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 4: Check DOM Elements</h2>
        <button onclick="testDOMElements()">Run Test</button>
        <div id="test4-output"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 5: Full Integration Test</h2>
        <button onclick="testFullIntegration()">Run Test</button>
        <div id="test5-output"></div>
    </div>
    
    <script>
        async function testFetchTerms() {
            const output = document.getElementById('test1-output');
            output.innerHTML = '<p>Testing fetch for TERMS.md...</p>';
            
            try {
                const response = await fetch('TERMS.md');
                console.log('TERMS.md Response:', response);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                output.innerHTML = `
                    <p class="success">✅ Success!</p>
                    <p>Status: ${response.status}</p>
                    <p>Content-Type: ${response.headers.get('content-type')}</p>
                    <p>Length: ${text.length} characters</p>
                    <details>
                        <summary>Show first 500 characters</summary>
                        <pre>${text.substring(0, 500)}</pre>
                    </details>
                `;
            } catch (error) {
                output.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        async function testFetchNotes() {
            const output = document.getElementById('test2-output');
            output.innerHTML = '<p>Testing fetch for NOTES.md...</p>';
            
            try {
                const response = await fetch('NOTES.md');
                console.log('NOTES.md Response:', response);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                output.innerHTML = `
                    <p class="success">✅ Success!</p>
                    <p>Status: ${response.status}</p>
                    <p>Length: ${text.length} characters</p>
                `;
            } catch (error) {
                output.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        function testMarkdownParser() {
            const output = document.getElementById('test3-output');
            const markdown = `# Test Header

## Subheader

This is **bold** and this is *italic*.

- Item 1
- Item 2

1. First
2. Second

---

**Note:** This is a test.`;
            
            const html = parseMarkdown(markdown);
            output.innerHTML = `
                <p class="success">✅ Parser executed</p>
                <h3>Input Markdown:</h3>
                <pre>${markdown}</pre>
                <h3>Output HTML:</h3>
                <div style="border: 1px solid #ddd; padding: 10px; background: white;">
                    ${html}
                </div>
            `;
        }
        
        function parseMarkdown(markdown) {
            let lines = markdown.split('\n');
            let html = '';
            let inList = false;
            let listType = '';
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                if (line.trim() === '') {
                    if (inList) {
                        html += listType === 'ul' ? '</ul>' : '</ol>';
                        inList = false;
                    }
                    html += '<br>';
                    continue;
                }
                
                if (line.startsWith('### ')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<h3>${parseInline(line.substring(4))}</h3>`;
                } else if (line.startsWith('## ')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<h2>${parseInline(line.substring(3))}</h2>`;
                } else if (line.startsWith('# ')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<h1>${parseInline(line.substring(2))}</h1>`;
                } else if (line.trim() === '---') {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += '<hr>';
                } else if (line.match(/^[\-\*] /)) {
                    if (!inList || listType !== 'ul') {
                        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
                        html += '<ul>';
                        inList = true;
                        listType = 'ul';
                    }
                    html += `<li>${parseInline(line.substring(2))}</li>`;
                } else if (line.match(/^\d+\. /)) {
                    if (!inList || listType !== 'ol') {
                        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
                        html += '<ol>';
                        inList = true;
                        listType = 'ol';
                    }
                    html += `<li>${parseInline(line.substring(line.indexOf('. ') + 2))}</li>`;
                } else {
                    if (inList) {
                        html += listType === 'ul' ? '</ul>' : '</ol>';
                        inList = false;
                    }
                    html += `<p>${parseInline(line)}</p>`;
                }
            }
            
            if (inList) {
                html += listType === 'ul' ? '</ul>' : '</ol>';
            }
            
            return html;
        }
        
        function parseInline(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            text = text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
            text = text.replace(/`(.*?)`/g, '<code>$1</code>');
            return text;
        }
        
        function testDOMElements() {
            const output = document.getElementById('test4-output');
            const results = [];
            
            // Check if elements exist in main dashboard
            const checks = [
                { id: 'documents-module', name: 'Documents Module' },
                { id: 'doc-terms', name: 'Terms Viewer' },
                { id: 'doc-notes', name: 'Notes Viewer' },
                { selector: '.doc-tab', name: 'Document Tabs', isClass: true }
            ];
            
            checks.forEach(check => {
                if (check.isClass) {
                    const elements = document.querySelectorAll(check.selector);
                    results.push(`${check.name}: ${elements.length > 0 ? '✅ Found (' + elements.length + ')' : '❌ Not found'}`);
                } else {
                    const element = document.getElementById(check.id);
                    results.push(`${check.name}: ${element ? '✅ Found' : '❌ Not found'}`);
                }
            });
            
            output.innerHTML = `
                <p><strong>DOM Element Check:</strong></p>
                <ul>
                    ${results.map(r => `<li>${r}</li>`).join('')}
                </ul>
                <p><em>Note: This page doesn't have the dashboard elements. Open your dashboard and check the browser console.</em></p>
            `;
        }
        
        async function testFullIntegration() {
            const output = document.getElementById('test5-output');
            output.innerHTML = '<p>Running full integration test...</p>';
            
            try {
                // Fetch TERMS.md
                const response = await fetch('TERMS.md');
                if (!response.ok) throw new Error('Failed to fetch TERMS.md');
                
                const markdown = await response.text();
                const html = parseMarkdown(markdown);
                
                output.innerHTML = `
                    <p class="success">✅ Full integration test passed!</p>
                    <h3>Rendered Document:</h3>
                    <div style="border: 1px solid #ddd; padding: 20px; background: white; max-height: 400px; overflow-y: auto;">
                        ${html}
                    </div>
                `;
            } catch (error) {
                output.innerHTML = `<p class="error">❌ Integration test failed: ${error.message}</p>`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
